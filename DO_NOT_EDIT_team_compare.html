<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HLL Team Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: rgba(9, 12, 18, 0.95);
            --allies: #00a2ff;
            --axis: #ff3c00;
            --accent: #ac2e2e;
            --border: 1px solid rgba(255, 255, 255, 0.12);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 3840px;
            height: 2160px;
            background: transparent;
            color: white;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .compare-card {
            width: 1600px;
            background: var(--bg);
            border: var(--border);
            border-radius: 20px;
            padding: 60px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border-left: 10px solid var(--accent);
            border-right: 10px solid var(--accent);
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            gap: 80px;
        }

        .team-name {
            font-size: 70px;
            text-transform: uppercase;
            letter-spacing: 10px;
            font-weight: 700;
        }

        .kd-mid {
            font-size: 40px;
            color: var(--accent);
            letter-spacing: 5px;
            font-weight: 700;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            margin-bottom: 20px;
        }

        .stat-value {
            font-size: 80px;
            font-weight: 700;
        }

        .stat-name {
            text-align: center;
            font-size: 28px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            letter-spacing: 4px;
        }

        .bar-container {
            grid-column: 1 / span 3;
            height: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 2px;
            display: flex;
            overflow: hidden;
            margin-bottom: 35px;
        }

        .bar {
            height: 100%;
            transition: width 0.8s ease-in-out;
        }

        .bar-left-blue {
            background: var(--allies);
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.4);
        }

        .bar-right-red {
            background: var(--axis);
            box-shadow: 0 0 20px rgba(255, 60, 0, 0.4);
        }

        .left-text {
            color: var(--allies);
            text-align: left;
        }

        .right-text {
            color: var(--axis);
            text-align: right;
        }

        #status-bar {
            margin-top: 24px;
            font-size: 24px;
            color: #ff9d00;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        #debug-bar {
            margin-top: 8px;
            font-size: 18px;
            color: rgba(255,255,255,0.75);
            letter-spacing: 1px;
            text-align: center;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="compare-card">
    <div class="header">
        <div id="left-label" class="team-name left-text">ALLIES</div>
        <div class="kd-mid">KILLDIFF</div>
        <div id="right-label" class="team-name right-text">AXIS</div>
    </div>
    <div id="stats-content"></div>
</div>

<div id="status-bar">SYNCING COMBAT DATA...</div>
<div id="debug-bar">DEBUG: WAITING FOR API...</div>

<script>
    const CONFIG_URL = "http://localhost:3000/config";

    const CATEGORY_ORDER = [
        { id: "infantry",  label: "Infantry" },
        { id: "sniper",    label: "Sniper" },
        { id: "mg",        label: "Machine Gun" },
        { id: "armor",     label: "Armor" },
        { id: "rocket",    label: "Anti-Tank" },
        { id: "artillery", label: "Artillery" },
        { id: "satchel",   label: "Satchel" }
    ];

    const AXIS_SIGS = [
        "mp40", "mp 40",
        "kar98", "kar98k", "karabiner", "karabiner 98k",
        "mg42", "mg34",
        "stg44", "stg 44",
        "gewehr", "fg42", "fg 42",
        "luger", "p38", "walther",
        "panzerfaust", "panzerschreck",
        "stielhandgranate", "m43 stielhandgranate", "m24 stielhandgranate",
        "s-mine", "tellermine", "tellermine 43",
        "flammenwerfer", "flammenwerfer 41",
        "zf41",
        "kwk", "75mm kwk", "88mm kwk", "20mm kwk",
        "panther", "panzer", "tiger", "luchs", "puma", "sd.kfz", "kubelwagen",
        "stuh", "sturmpanzer", "strumpanzer", "brumm",
        "marder", "opel blitz",
        "pak40", "pak 40",
        "lefh", "sfh", "150mm",
    ];

    const ALLIED_SIGS = [
        "m1 garand", "garand",
        "m1 carbine", "carbine",
        "thompson", "m1a1 thompson",
        "m1918a2 bar", "m1918a2",
        "m1911", "colt m1911",
        "m1903", "m1903 springfield", "springfield",
        "m97 trench gun",
        "grease gun", "m3 grease gun",
        "browning m1919",
        "mk2 grenade", "mk2",
        "m2 ap mine", "m2 flamethrower",
        "bazooka",
        "75mm cannon [sherman", "76mm m1",
        "coaxial m1919", "hull m1919",
        "stuart", "sherman", "greyhound", "m8 greyhound", "jumbo",
        "m4a1", "m4a3", "m5a1", "m8a1",
        "105mm howitzer [m4a3", "155mm howitzer", "m114",
        "lee-enfield", "enfield", "sten", "piat", "lewis",
        "17 pounder", "17pdr", "qf 75mm", "qf 6 pounder", "qf 2 pounder",
        "churchill", "cromwell", "firefly", "crusader", "tetrarch", "daimler",
        "mosin", "mosin-nagant", "ppsh", "svt", "svt-40", "svt40", "tokarev",
        "dp-27", "dp27", "rg-42 grenade",
        "t-34", "t34", "t-70", "t70", "is-1", "is-2", "is1", "is2",
        "ba-10", "ba10", "kv-1", "kv1", "kv-2",
        "76mm zis", "76mm f-34", "zis-2", "zis-3",
        "122mm", "katyusha",
        "willys", "jeep willys",
    ];

    const CAT_MAP = {
        artillery: [
            "artillery", "howitzer", "155mm", "150mm", "105mm",
            "bombing run", "precision strike", "strafing run", "m114"
        ],
        satchel: [
            "satchel", "explosive charge"
        ],
        rocket: [
            "bazooka", "panzerschreck", "piat", "panzerfaust"
        ],
        sniper: [
            "zf41", "zf 41", "8x", "x8", "4x", "x4", "pu", "l42",
            "m1903 springfield", "kar98k x8", "fg42 x4", "fg 42 x4"
        ],
        armor: [
            "75mm kwk", "88mm kwk", "20mm kwk", "kwk",
            "75mm cannon", "76mm m1", "37mm cannon", "m6 37mm",
            "coaxial", "hull",
            "sherman", "stuart", "greyhound",
            "panther", "panzer", "tiger", "luchs", "puma", "sd.kfz",
            "t-34", "t34", "is-1", "is-2", "churchill", "cromwell", "firefly",
            "sturmpanzer", "stuh"
        ],
        mg: [
            "mg42", "mg34", "m1919", "browning", "lewis", "dp-27", "dp27"
        ],
        infantry: [
            "m1 garand", "garand",
            "m1 carbine", "carbine",
            "thompson", "m1a1 thompson",
            "m1918a2 bar", "bar",
            "m1911", "colt m1911",
            "m1903", "springfield",
            "m97 trench gun",
            "grease gun", "m3 grease gun",
            "lee-enfield", "enfield", "sten",
            "mosin", "ppsh", "svt", "svt-40", "tokarev",
            "kar98", "kar98k", "karabiner",
            "mp40", "mp 40", "stg44", "stg 44", "gewehr", "fg42", "fg 42",
            "luger", "p38", "walther",
            "stielhandgranate", "m43 stielhandgranate",
            "mk2 grenade", "feldspaten", "unknown"
        ]
    };

    function toNum(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
    }

    function weaponKillValue(raw) {
        if (typeof raw === "number" || typeof raw === "string") return toNum(raw);
        if (raw && typeof raw === "object") {
            return toNum(raw.kills ?? raw.kill ?? raw.count ?? raw.value ?? raw.total ?? 0);
        }
        return 0;
    }

    function cleanKills(p) {
        return Math.max(0, toNum(p?.kills) - toNum(p?.teamkills));
    }

    function emptyCategories() {
        return {
            infantry: 0,
            sniper: 0,
            mg: 0,
            armor: 0,
            rocket: 0,
            artillery: 0,
            satchel: 0
        };
    }

    function dedupePlayers(players) {
        const map = new Map();

        for (const p of players || []) {
            const key = p.player_id || p.player || p?.steaminfo?.id;
            if (!key) continue;

            const existing = map.get(key);
            if (!existing) {
                map.set(key, p);
                continue;
            }

            const currentKills = cleanKills(p);
            const existingKills = cleanKills(existing);
            const currentDeaths = toNum(p?.deaths);
            const existingDeaths = toNum(existing?.deaths);
            const currentTime = toNum(p?.time_seconds);
            const existingTime = toNum(existing?.time_seconds);

            if (
                currentKills > existingKills ||
                (currentKills === existingKills && currentDeaths > existingDeaths) ||
                (currentKills === existingKills && currentDeaths === existingDeaths && currentTime > existingTime)
            ) {
                map.set(key, p);
            }
        }

        return Array.from(map.values());
    }

    function scoreWeaponsMap(obj, sigs) {
        let score = 0;
        for (const [name, rawVal] of Object.entries(obj || {})) {
            const amount = weaponKillValue(rawVal);
            if (amount <= 0) continue;
            const n = String(name || "").toLowerCase();
            if (sigs.some(sig => n.includes(sig))) score += amount;
        }
        return score;
    }

    function identifyTeam(p) {
        const t = String(p?.team || "").trim().toLowerCase();

        // All Allied factions: US, Soviet, British, Canadian
        if (
            t.includes("allies") || t.includes("allied") ||
            t.includes("us") || t.includes("usa") || t.includes("american") ||
            t.includes("soviet") || t.includes("ussr") || t.includes("russia") ||
            t.includes("british") || t.includes("britain") || t.includes("uk") ||
            t.includes("canadian") || t.includes("canada")
        ) return "Allies";

        // All Axis factions: Wehrmacht, Waffen-SS, Luftwaffe
        if (
            t.includes("axis") || t.includes("german") || t.includes("ger") ||
            t.includes("deutsch") || t.includes("waffen") || t.includes("luftwaffe")
        ) return "Axis";

        const weaponAllied = scoreWeaponsMap(p?.weapons || {}, ALLIED_SIGS);
        const weaponAxis = scoreWeaponsMap(p?.weapons || {}, AXIS_SIGS);

        if (weaponAllied > weaponAxis) return "Allies";
        if (weaponAxis > weaponAllied) return "Axis";

        const deathByAllied = scoreWeaponsMap(p?.death_by_weapons || {}, ALLIED_SIGS);
        const deathByAxis = scoreWeaponsMap(p?.death_by_weapons || {}, AXIS_SIGS);

        if (deathByAxis > deathByAllied) return "Allies";
        if (deathByAllied > deathByAxis) return "Axis";

        return null;
    }

    function getCategoryForWeapon(name) {
        const n = String(name || "").toLowerCase();

        for (const cat of ["artillery", "satchel", "rocket", "sniper", "armor", "mg", "infantry"]) {
            if (CAT_MAP[cat].some(sig => n.includes(sig))) return cat;
        }

        return "infantry";
    }

    function allocatePlayerCategories(p) {
        const result = emptyCategories();
        const total = cleanKills(p);
        if (total <= 0) return result;

        const weapons = p?.weapons || {};
        let assigned = 0;

        for (const [name, rawVal] of Object.entries(weapons)) {
            let kills = weaponKillValue(rawVal);
            if (kills <= 0) continue;

            const remaining = total - assigned;
            if (remaining <= 0) break;

            kills = Math.min(kills, remaining);
            const cat = getCategoryForWeapon(name);
            result[cat] += kills;
            assigned += kills;
        }

        const leftover = total - assigned;
        if (leftover > 0) result.infantry += leftover;

        return result;
    }

    function isZeroedPlayer(p) {
        return (
            toNum(p?.kills) === 0 &&
            toNum(p?.deaths) === 0 &&
            toNum(p?.combat) === 0 &&
            toNum(p?.offense) === 0 &&
            toNum(p?.defense) === 0 &&
            toNum(p?.support) === 0
        );
    }

    function shouldResetFromSnapshot(players, previousTotalKills) {
        const active = (players || []).filter(p => toNum(p?.time_seconds) > 0);
        if (active.length < 30) return false;
        if (previousTotalKills <= 50) return false;

        const zeroedCount = active.filter(isZeroedPlayer).length;
        const zeroRatio = zeroedCount / active.length;

        return zeroRatio >= 0.8;
    }

    async function fetchNoCache(url) {
        const full = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
        const res = await fetch(full, { cache: "no-store" });
        return res.json();
    }

    let cachedConfig = {
        api_endpoint: "",
        swap_sides: false,
        allied_faction: "ALLIES",
        axis_faction: "GERMANY"
    };
    async function pollConfig() {
        try {
            const r = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
            if (!r.ok) throw new Error("config " + r.status);

            const cfg = await r.json();
            if (cfg && cfg.api_endpoint !== undefined) {
                cachedConfig = cfg;
                if (lastSwap !== null && lastSwap !== cfg.swap_sides) update();
                lastSwap = cfg.swap_sides;
            }
        } catch (e) {
            console.warn("[HLL] pollConfig failed:", e.message);
        }
    }

    async function update() {
        try {
            const settings = cachedConfig;

            if (!settings.api_endpoint) {
                document.getElementById("status-bar").innerText = "AWAITING API — CHECK HUB";
                document.getElementById("debug-bar").innerText = "DEBUG: NO API";
                return;
            }

            const data = await fetchNoCache(settings.api_endpoint);
            const rawPlayers = data?.result?.stats || [];
            const deduped = dedupePlayers(rawPlayers);

            // ── Count kills by weapon faction directly.
            // Each weapon kill is attributed to the side that uses that weapon.
            // No player-level team guessing needed — a kill with MG42 is an Axis
            // kill regardless of who fired it. This handles cross-faction weapon
            // use (captured weapons) and completely avoids team misidentification.

            const teams = {
                Allies: { total: 0, cats: emptyCategories(), players: new Set() },
                Axis:   { total: 0, cats: emptyCategories(), players: new Set() }
            };

            let unknownKills = 0;

            // Count kills from the VICTIM's death_by_weapons rather than the
            // attacker's weapons list. This eliminates crew-sharing inflation:
            // a tank kill credits all 3 crew members in the attacker's weapons,
            // but the victim only dies ONCE — so death_by_weapons counts it once.
            for (const p of deduped) {
                for (const [weapon, rawVal] of Object.entries(p.death_by_weapons || {})) {
                    const deaths = weaponKillValue(rawVal);
                    if (deaths <= 0) continue;

                    const n = String(weapon).toLowerCase();
                    const isAllied = ALLIED_SIGS.some(sig => n.includes(sig));
                    const isAxis   = AXIS_SIGS.some(sig => n.includes(sig));

                    // Allied weapon killed this player → Allied team scored a kill
                    // Axis weapon killed this player → Axis team scored a kill
                    let side = null;
                    if (isAllied && !isAxis) side = "Allies";
                    else if (isAxis && !isAllied) side = "Axis";

                    if (!side) { unknownKills += deaths; continue; }

                    const cat = getCategoryForWeapon(weapon);
                    teams[side].total += deaths;
                    teams[side].cats[cat] += deaths;
                }
            }

            const swapped     = settings.swap_sides === true;
            const alliedName  = settings.allied_faction || "ALLIES";
            const axisName    = settings.axis_faction   || "GERMANY";

            const leftTeamKey  = swapped ? "Axis"   : "Allies";
            const rightTeamKey = swapped ? "Allies" : "Axis";

            document.getElementById("left-label").innerText  = swapped ? axisName   : alliedName;
            document.getElementById("right-label").innerText = swapped ? alliedName : axisName;

            let html = "";

            CATEGORY_ORDER.forEach(row => {
                const leftVal  = teams[leftTeamKey].cats[row.id]  || 0;
                const rightVal = teams[rightTeamKey].cats[row.id] || 0;
                const pct = (leftVal / ((leftVal + rightVal) || 1)) * 100;

                html += `
                    <div class="stat-row">
                        <div class="stat-value left-text">${leftVal}</div>
                        <div class="stat-name">${row.label}</div>
                        <div class="stat-value right-text">${rightVal}</div>
                        <div class="bar-container">
                            <div class="bar bar-left-blue" style="width:${pct}%"></div>
                            <div class="bar bar-right-red" style="width:${100 - pct}%"></div>
                        </div>
                    </div>
                `;
            });

            const totalL = teams[leftTeamKey].total;
            const totalR = teams[rightTeamKey].total;

            html += `
                <div class="stat-row" style="margin-top:20px; border-top: 2px solid rgba(255,255,255,0.08); padding-top:15px;">
                    <div class="stat-value left-text" style="font-size:90px">${totalL}</div>
                    <div class="stat-name" style="color:var(--accent); font-weight:700; font-size:22px;">TOTAL KILLS</div>
                    <div class="stat-value right-text" style="font-size:90px">${totalR}</div>
                </div>
            `;

            document.getElementById("stats-content").innerHTML = html;
            document.getElementById("status-bar").innerText =
                `SIGNAL SECURE | SYNCED: ${deduped.length} PLAYERS`;

            document.getElementById("debug-bar").innerText =
                `DEBUG | RAW=${rawPlayers.length} | DEDUPED=${deduped.length} | ALLIES=${totalL} | AXIS=${totalR} | UNKNOWN_DEATHS=${unknownKills} | MODE=death_by_weapons`;

        } catch (e) {
            console.error(e);
            document.getElementById("status-bar").innerText = "SIGNAL LOST";
            document.getElementById("debug-bar").innerText = "DEBUG: ERROR — " + e.message;
        }
    }
    pollConfig().then(() => update());
    setInterval(pollConfig, 1000);
    setInterval(update, 4000);
</script>
</body>
</html>
